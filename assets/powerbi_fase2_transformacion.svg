  <rect x="550" y="324" width="240" height="42" class="step"/><text x="565" y="351" class="t">3. Tratar nulos</text>
  <rect x="550" y="376" width="240" height="42" class="step"/><text x="565" y="403" class="t">4. Unificar categorías</text>
  <rect x="550" y="428" width="240" height="42" class="step"/><text x="565" y="455" class="t">5. Crear columna Mes</text>

  <rect x="860" y="150" width="280" height="470" class="box"/>
  <text x="890" y="190" class="h">Resultado limpio</text>
  <text x="890" y="225" class="t">Filas duplicadas: 0</text>
  <text x="890" y="255" class="t">Nulos en Importe: 0</text>
  <text x="890" y="285" class="t">Tipos: OK</text>
  <text x="890" y="315" class="t">Columnas útiles: 8</text>

  <line x1="480" y1="385" x2="520" y2="385" stroke="#6b7280" stroke-width="3"/>
  <line x1="820" y1="385" x2="860" y2="385" stroke="#6b7280" stroke-width="3"/>
</svg>
