<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 20px Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 12; }
      .h { font: 700 20px Segoe UI, Arial, sans-serif; fill: #111827; }
      .t { font: 500 16px Segoe UI, Arial, sans-serif; fill: #374151; }
      .step { fill: #f3f4f6; stroke: #e5e7eb; rx: 8; }
    </style>
  </defs>

  <rect width="1200" height="700" fill="#f9fafb"/>
  <text x="60" y="70" class="title">Fase 2 · Transformación de Datos (Power Query)</text>
  <text x="60" y="102" class="subtitle">Pipeline ETL reproducible con pasos aplicados</text>

  <rect x="60" y="150" width="420" height="470" class="box"/>
  <text x="90" y="190" class="h">Tabla origen: FactVentas</text>
  <text x="90" y="225" class="t">Fecha | IdCliente | Importe | Categoria</text>
  <text x="90" y="255" class="t">2026-01-02 | C-001 | 129.90 | Software</text>
  <text x="90" y="285" class="t">2026-01-03 | C-015 | null   | Servicios</text>
  <text x="90" y="315" class="t">2026-01-03 | C-015 | null   | Servicios</text>
  <text x="90" y="345" class="t">2026-01-05 | C-102 | 59.00  | Soporte</text>

  <rect x="520" y="150" width="300" height="470" class="box"/>
  <text x="550" y="190" class="h">Pasos aplicados</text>
  <rect x="550" y="220" width="240" height="42" class="step"/><text x="565" y="247" class="t">1. Cambiar tipos</text>
