<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8ff" />
      <stop offset="100%" stop-color="#eef7f0" />
    </linearGradient>
    <style>
      .title { font: 700 34px Segoe UI, Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 20px Segoe UI, Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 14; }
      .h { font: 700 20px Segoe UI, Arial, sans-serif; fill: #111827; }
      .t { font: 500 16px Segoe UI, Arial, sans-serif; fill: #374151; }
      .pill { fill: #e0ecff; }
      .pilltxt { font: 700 14px Segoe UI, Arial, sans-serif; fill: #1d4ed8; }
    </style>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" />
  <text x="60" y="70" class="title">Fase 1 · Obtención de Datos (Proyecto Genérico)</text>
  <text x="60" y="102" class="subtitle">Ejemplo: ventas, clientes y catálogo desde orígenes simples</text>

  <rect x="60" y="150" width="300" height="210" class="box" />
  <rect x="90" y="175" width="70" height="24" class="pill" rx="12"/>
  <text x="105" y="192" class="pilltxt">Excel</text>
  <text x="90" y="230" class="h">ventas_2026.xlsx</text>
  <text x="90" y="260" class="t">Hoja: FactVentas</text>
  <text x="90" y="290" class="t">Filas: 12.540</text>

  <rect x="450" y="150" width="300" height="210" class="box" />
  <rect x="480" y="175" width="90" height="24" class="pill" rx="12"/>
  <text x="500" y="192" class="pilltxt">CSV</text>
  <text x="480" y="230" class="h">clientes.csv</text>
  <text x="480" y="260" class="t">Campos: id, segmento, pais</text>
  <text x="480" y="290" class="t">Filas: 3.215</text>

  <rect x="840" y="150" width="300" height="210" class="box" />
  <rect x="870" y="175" width="120" height="24" class="pill" rx="12"/>
  <text x="893" y="192" class="pilltxt">Catálogo</text>
  <text x="870" y="230" class="h">productos.xlsx</text>
  <text x="870" y="260" class="t">Campos: sku, categoria</text>
  <text x="870" y="290" class="t">Filas: 460</text>

  <path d="M 360 255 L 430 255" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 750 255 L 820 255" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="200" y="430" width="800" height="190" class="box" />
  <text x="230" y="470" class="h">Validaciones de entrada</text>
  <text x="230" y="505" class="t">• Claves no nulas: IdCliente, Fecha, Importe</text>
  <text x="230" y="535" class="t">• Tipos correctos: fecha, decimal, texto</text>
  <text x="230" y="565" class="t">• Duplicados detectados y marcados para limpieza en Power Query</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
